name: Build and Release

# 推送到 main 分支时触发构建并发布 Release
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write   # 发布 Release 需要写权限

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        shell: bash
        run: |
          # ubuntu-latest 已预装 Android SDK；定位 sdkmanager 并确保目标平台就绪
          SDKMGR="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMGR" ]; then
            SDKMGR="$(ls "$ANDROID_HOME"/cmdline-tools/*/bin/sdkmanager 2>/dev/null | head -1)"
          fi
          echo "Using sdkmanager: $SDKMGR"
          yes | "$SDKMGR" --licenses > /dev/null 2>&1 || true
          "$SDKMGR" "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Assemble Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload build outputs (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-outputs
          path: app/build/outputs/
          if-no-files-found: ignore

      - name: Prepare release assets
        id: prep
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Release APK not found at $APK_PATH"
            ls -R app/build/outputs/ || true
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          # 生成版本号标签：vX.Y-<short sha>，便于多次推送都生成新 release
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="v1.0-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing APK: $APK_PATH with tag $TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.prep.outputs.tag }}" \
            "${{ steps.prep.outputs.apk_path }}" \
            --title "倒数日 ${{ steps.prep.outputs.tag }}" \
            --notes "自动构建发布（基于 commit ${{ github.sha }}）。

          - APK 使用 debug 签名，可直接安装
          - 由 GitHub Actions 在 main 分支推送时自动构建" \
            --prerelease=false
